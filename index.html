<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UmzugsBox">
<title>📦 UmzugsBox</title>
<link rel="apple-touch-icon" href="/Umzug/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <div id="hdr">
    <button id="back-btn" onclick="goBack()" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 id="hdr-title">📦 UmzugsBox</h1>
    <div id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;opacity:0;transition:opacity .3s;flex-shrink:0" title="Synchronisiert…"></div>
    <div id="hdr-actions"></div>
  </div>
  <div id="content"><div class="scroll-area" style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div style="color:var(--muted);font-size:15px">Lade…</div></div></div>
  <nav id="nav">
    <button class="nb" id="nb-list" onclick="navigate('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>KARTONS
    </button>
    <button class="nb" id="nb-search" onclick="navigate('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>SUCHE
    </button>
    <button class="nb" id="nb-scan" onclick="navigate('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
        <rect x="3" y="16" width="5" height="5" rx="1"/><line x1="16" y1="16" x2="16" y2="21"/>
        <line x1="16" y1="16" x2="21" y2="16"/><line x1="21" y1="21" x2="16" y2="21"/><line x1="21" y1="16" x2="21" y2="21"/>
      </svg>SCANNEN
    </button>
    <button class="nb" id="nb-settings" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>EINSTELLUNGEN
    </button>
  </nav>
</div>
<div id="toast"></div>
<div id="photo-modal">
  <button id="photo-modal-close" onclick="closePhotoModal()">✕</button>
  <img id="photo-modal-img" src="" alt="">
  <div style="position:absolute;bottom:32px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button id="photo-modal-drive" onclick="loadModalFromDrive()" style="display:none;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:14px;font-weight:700;padding:10px 20px;border-radius:20px;cursor:pointer">☁️ Vollbild aus Drive laden</button>
    <button id="photo-modal-del" onclick="deleteModalPhoto()" style="display:none;background:rgba(239,68,68,.8);border:none;color:#fff;font-size:14px;font-weight:700;padding:10px 20px;border-radius:20px;cursor:pointer">🗑️ Foto löschen</button>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
