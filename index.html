<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>📦 UmzugsBox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0f172a;--ink2:#334155;--muted:#94a3b8;
  --surface:#ffffff;--surface2:#f8fafc;--bg:#eef2f7;
  --border:#e2e8f0;--primary:#4f46e5;--primary-light:#818cf8;
  --danger:#ef4444;--success:#16a34a;
  --nav-h:64px;--hdr-h:58px;
  --r:14px;--shadow:0 2px 12px rgba(15,23,42,.1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overscroll-behavior:none}
/* ── Layout ── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--ink);color:#fff;
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200;
  box-shadow:0 1px 0 rgba(255,255,255,.08)}
#hdr h1{flex:1;font-size:17px;font-weight:700;letter-spacing:-.3px}
#hdr button{background:none;border:none;color:#fff;cursor:pointer;padding:8px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;opacity:.85;transition:opacity .15s}
#hdr button:active{opacity:1;background:rgba(255,255,255,.12)}
#content{padding:var(--hdr-h) 0 0;min-height:100vh}
.scroll-area{padding:16px 14px calc(var(--nav-h) + 16px);overflow-y:auto}
/* ── Nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);
  border-top:1px solid var(--border);display:flex;z-index:200;
  box-shadow:0 -4px 20px rgba(15,23,42,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;color:var(--muted);cursor:pointer;
  font-size:10px;font-weight:700;letter-spacing:.4px;padding:6px 0;transition:color .2s}
.nb.on{color:var(--primary)}
.nb svg{width:22px;height:22px}
/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--r);padding:16px;
  box-shadow:var(--shadow);margin-bottom:12px}
.box-card{display:flex;align-items:center;gap:12px;cursor:pointer;border:none;
  width:100%;text-align:left;background:var(--surface);border-radius:var(--r);
  padding:14px;box-shadow:var(--shadow);margin-bottom:10px;transition:transform .15s}
.box-card:active{transform:scale(.98)}
.color-slab{width:44px;height:44px;border-radius:10px;flex-shrink:0;
  border:2px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;
  font-size:20px}
.box-info{flex:1;min-width:0}
.box-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.box-meta{font-size:12px;color:var(--muted);margin-top:3px;font-weight:500}
/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 20px;border-radius:11px;border:none;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:-.2px}
.btn-p{background:var(--primary);color:#fff}
.btn-p:active{background:#4338ca}
.btn-s{background:var(--bg);color:var(--primary);border:1.5px solid var(--border)}
.btn-s:active{background:var(--border)}
.btn-d{background:#fff1f2;color:var(--danger);border:1.5px solid #fecdd3}
.btn-w{width:100%}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:9px}
/* ── Forms ── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--muted);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:11px;font-size:15px;background:var(--surface);color:var(--ink);
  outline:none;transition:border-color .2s;font-family:inherit;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:none;min-height:80px}
/* ── Color picker ── */
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
.csw{aspect-ratio:1;border-radius:9px;cursor:pointer;transition:transform .15s;
  border:2.5px solid transparent;outline:none}
.csw.sel{border-color:var(--primary);transform:scale(1.18);box-shadow:0 0 0 2px rgba(79,70,229,.2)}
/* ── Items ── */
.item-row{display:flex;align-items:flex-start;gap:12px;padding:13px 0;
  border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-body{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:600}
.item-note{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
.item-qty{background:var(--bg);padding:5px 11px;border-radius:20px;
  font-size:13px;font-weight:800;color:var(--primary);flex-shrink:0;font-family:'DM Mono',monospace}
.icon-btn{background:none;border:none;cursor:pointer;padding:7px;border-radius:9px;
  font-size:17px;display:flex;align-items:center}
.icon-btn:active{background:var(--bg)}
/* ── QR ── */
#qr-code canvas,#qr-code img{border-radius:10px;display:block}
/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .emo{font-size:56px;margin-bottom:16px}
/* ── Section label ── */
.sec{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin:20px 0 8px;padding:0 2px}
/* ── Toast ── */
#toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;
  padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;
  opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ── Chips ── */
.chip{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;
  font-weight:700;letter-spacing:.2px;border:1.5px solid rgba(0,0,0,.1)}
/* ── Detail color bar ── */
.dcb{height:5px;border-radius:3px;margin-bottom:14px}
/* ── Stats grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center}
.stat-val{font-size:36px;font-weight:800;color:var(--primary);line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
/* ── Scanner ── */
#reader{border-radius:12px!important;overflow:hidden}
#reader video{border-radius:12px}
#html5-qrcode-button-camera-permission,#html5-qrcode-button-camera-stop,#html5-qrcode-button-camera-stop{display:none!important}
/* ── User pill ── */
.user-pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;
  font-size:12px;font-weight:700;cursor:pointer;border:none;color:#fff}
/* ── Color legend ── */
.legend-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--bg);border-radius:9px}
.legend-dot{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(0,0,0,.08);flex-shrink:0}
@media print{#nav,#hdr,.no-print{display:none!important}#content{padding:0!important}.scroll-area{padding:20px!important}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button id="back-btn" onclick="goBack()" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 id="hdr-title">📦 UmzugsBox</h1>
    <div id="hdr-actions"></div>
  </div>
  <div id="content"><div class="scroll-area" style="display:flex;align-items:center;justify-content:center;min-height:60vh"><div style="color:var(--muted);font-size:15px">Lade…</div></div></div>
  <nav id="nav">
    <button class="nb" id="nb-list" onclick="navigate('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>KARTONS
    </button>
    <button class="nb" id="nb-search" onclick="navigate('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>SUCHE
    </button>
    <button class="nb" id="nb-scan" onclick="navigate('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
        <rect x="3" y="16" width="5" height="5" rx="1"/><line x1="16" y1="16" x2="16" y2="21"/>
        <line x1="16" y1="16" x2="21" y2="16"/><line x1="21" y1="21" x2="16" y2="21"/><line x1="21" y1="16" x2="21" y2="21"/>
      </svg>SCANNEN
    </button>
    <button class="nb" id="nb-settings" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>EINSTELLUNGEN
    </button>
  </nav>
</div>
<div id="toast"></div>
<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const COLORS=[
  {id:'rot',    name:'Rot',    hex:'#ef4444',emoji:'🔴'},
  {id:'orange', name:'Orange', hex:'#f97316',emoji:'🟠'},
  {id:'gelb',   name:'Gelb',   hex:'#eab308',emoji:'🟡'},
  {id:'gruen',  name:'Grün',   hex:'#22c55e',emoji:'🟢'},
  {id:'blau',   name:'Blau',   hex:'#3b82f6',emoji:'🔵'},
  {id:'lila',   name:'Lila',   hex:'#a855f7',emoji:'🟣'},
  {id:'pink',   name:'Pink',   hex:'#ec4899',emoji:'🩷'},
  {id:'tuerkis',name:'Türkis', hex:'#06b6d4',emoji:'🩵'},
  {id:'braun',  name:'Braun',  hex:'#92400e',emoji:'🟤'},
  {id:'grau',   name:'Grau',   hex:'#94a3b8',emoji:'⚫'},
  {id:'weiss',  name:'Weiß',   hex:'#e2e8f0',emoji:'⚪'},
  {id:'schwarz',name:'Schwarz',hex:'#1e293b',emoji:'⬛'},
];
const ROOMS=['Wohnzimmer','Schlafzimmer','Küche','Kinderzimmer 1','Kinderzimmer 2',
  'Badezimmer','WC','Flur/Diele','Arbeitszimmer/Büro','Keller','Dachboden',
  'Abstellraum','Garage','Balkon/Terrasse','Sonstiges'];
const USERS=['Nutzer 1','Nutzer 2','Nutzer 3'];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let boxes=[], view='list', selBox=null, selItem=null;
let scanner=null, tempBox=null, tempItem=null;
let currentUser='Nutzer 1', scriptUrl='', lastSync=null;

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
async function loadData(){
  try{const r=await window.storage.get('ub_boxes',true);if(r)boxes=JSON.parse(r.value);}catch(e){boxes=[];}
  try{const r=await window.storage.get('ub_settings',false);if(r){const s=JSON.parse(r.value);currentUser=s.user||'Nutzer 1';scriptUrl=s.scriptUrl||'';lastSync=s.lastSync||null;}}catch(e){}
}
async function saveBoxes(){
  try{await window.storage.set('ub_boxes',JSON.stringify(boxes),true);}catch(e){toast('❌ Speicherfehler');}
}
async function saveSettings(){
  try{await window.storage.set('ub_settings',JSON.stringify({user:currentUser,scriptUrl,lastSync}),false);}catch(e){}
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function navigate(v,opts={}){
  killScanner();
  view=v;
  if(opts.boxId!==undefined)selBox=opts.boxId;
  if(opts.itemId!==undefined)selItem=opts.itemId;
  if(v==='new-box')tempBox=null;
  if(v==='new-item')tempItem=null;
  render();
}
function goBack(){
  killScanner();
  if(view==='detail')navigate('list');
  else if(view==='edit-box'||view==='new-box'){tempBox=null;selBox?navigate('detail',{boxId:selBox}):navigate('list');}
  else if(view==='edit-item'||view==='new-item'){tempItem=null;navigate('detail',{boxId:selBox});}
  else navigate('list');
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const getBox=id=>boxes.find(b=>b.id===id);
const getColor=id=>COLORS.find(c=>c.id===id)||COLORS[4];
const uid=()=>'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let toastTimer;
function toast(msg,ms=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),ms);
}

function showQR(containerId,text){
  const el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML='';
  try{new QRCode(el,{text,width:200,height:200,colorDark:'#0f172a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}
  catch(e){el.innerHTML='<p style="color:var(--danger);font-size:13px">QR-Fehler</p>';}
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const back=document.getElementById('back-btn');
  const title=document.getElementById('hdr-title');
  const acts=document.getElementById('hdr-actions');
  ['list','search','scan','settings'].forEach(n=>{
    document.getElementById('nb-'+n)?.classList.toggle('on',
      n==='list'?['list','detail','edit-box','new-box','edit-item','new-item'].includes(view)
      :view===n);
  });
  const hasBack=['detail','edit-box','new-box','edit-item','new-item'].includes(view);
  back.style.display=hasBack?'flex':'none';
  ({list:renderList,detail:renderDetail,'edit-box':()=>renderBoxForm(false),
    'new-box':()=>renderBoxForm(true),'edit-item':()=>renderItemForm(false),
    'new-item':()=>renderItemForm(true),scan:renderScanner,search:renderSearch,settings:renderSettings}
  [view]||renderList)(title,acts);
}

// ═══════════════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════════════
function renderList(title,acts){
  document.getElementById('hdr-title').textContent='📦 UmzugsBox';
  document.getElementById('hdr-actions').innerHTML=`
    <button onclick="navigate('new-box')" title="Neu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>`;
  const c=document.getElementById('content');
  if(boxes.length===0){
    c.innerHTML=`<div class="scroll-area"><div class="empty"><div class="emo">📦</div>
      <p style="font-size:20px;font-weight:800;margin-bottom:6px;color:var(--ink)">Noch keine Kartons</p>
      <p style="margin-bottom:28px">Erstelle deinen ersten Umzugskarton</p>
      <button class="btn btn-p btn-w" onclick="navigate('new-box')">+ Neuen Karton anlegen</button>
    </div></div>`;return;
  }
  const groups={};
  boxes.forEach(b=>{const k=b.sourceRoom||'Sonstiges';if(!groups[k])groups[k]=[];groups[k].push(b);});
  let html=`<div class="scroll-area">
    <div style="color:var(--muted);font-size:13px;font-weight:600;margin-bottom:14px;padding:0 2px">
      ${boxes.length} Karton${boxes.length!==1?'en':''} · ${boxes.reduce((s,b)=>s+(b.items?.length||0),0)} Gegenstände
    </div>`;
  Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).forEach(([room,rb])=>{
    html+=`<div class="sec">📍 ${room}</div>`;
    rb.forEach(box=>{
      const col=getColor(box.color);
      const ic=box.items?.length||0;
      html+=`<button class="box-card" onclick="navigate('detail',{boxId:'${box.id}'})">
        <div class="color-slab" style="background:${col.hex}">${col.emoji}</div>
        <div class="box-info">
          <div class="box-name">${esc(box.name)}</div>
          <div class="box-meta">${esc(box.sourceRoom||'—')} → ${esc(box.destination||'—')} · ${ic} Gegenstand${ic!==1?'stände':''}</div>
          ${box.lastEditor?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-weight:500">✏️ ${esc(box.lastEditor)}</div>`:''}
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>`;
    });
  });
  c.innerHTML=html+'</div>';
}

// ═══════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════
function renderDetail(){
  const box=getBox(selBox);if(!box){navigate('list');return;}
  const col=getColor(box.color);
  const items=box.items||[];
  document.getElementById('hdr-title').textContent=box.name;
  document.getElementById('hdr-actions').innerHTML=`
    <button onclick="startEditBox()" title="Bearbeiten">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>`;
  const textColor=['gelb','weiss'].includes(box.color)?'#1e293b':'#fff';
  document.getElementById('content').innerHTML=`<div class="scroll-area">
    <!-- Info card -->
    <div class="card">
      <div class="dcb" style="background:${col.hex}"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        <span class="chip" style="background:${col.hex};color:${textColor}">${col.emoji} ${col.name}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.7px">Herkunft</div>
          <div style="font-size:16px;font-weight:700;margin-top:4px">${esc(box.sourceRoom||'—')}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.7px">Ziel</div>
          <div style="font-size:16px;font-weight:700;margin-top:4px">${esc(box.destination||'—')}</div>
        </div>
      </div>
      ${box.lastEditor?`<div style="font-size:12px;color:var(--muted);margin-top:10px;font-weight:500">Zuletzt bearbeitet von ${esc(box.lastEditor)}</div>`:''}
    </div>

    <!-- Items card -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-weight:800;font-size:15px">Inhalt <span style="color:var(--muted);font-weight:600">(${items.length})</span></span>
        <button class="btn btn-s btn-sm no-print" onclick="navigate('new-item',{boxId:'${box.id}'})">+ Hinzufügen</button>
      </div>

        style="padding-left:42px;font-size:16px;border-radius:12px;border:1.5px solid var(--border);width:100%;height:48px"
        oninput="runItemSearch(this.value)" autofocus>
    </div>
    <div id="item-search-results">
      <div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;font-weight:500">
        Tippe um Gegenstände oder Kartons zu suchen
      </div>
    </div>
  </div>`;

function runItemSearch(q){
  const el=document.getElementById('item-search-results');
  if(!el)return;
  const term=q.trim().toLowerCase();
  if(!term){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;font-weight:500">Tippe um Gegenstände oder Kartons zu suchen</div>`;
    return;
  }

  // Collect all matching items across all boxes, plus matching boxes by name
  const itemHits=[];
  const boxHits=[];

  boxes.forEach(box=>{
    // Box-level match
    if(box.name.toLowerCase().includes(term)||
       (box.sourceRoom||'').toLowerCase().includes(term)||
       (box.destination||'').toLowerCase().includes(term)){
      boxHits.push(box);
    }
    // Item-level match
    (box.items||[]).forEach(item=>{
      if(item.name.toLowerCase().includes(term)||(item.notes||'').toLowerCase().includes(term)){
        itemHits.push({item,box});
      }
    });
  });

  if(!itemHits.length&&!boxHits.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px">
      <div style="font-size:40px;margin-bottom:12px">🔍</div>
      <p style="color:var(--muted);font-size:15px;font-weight:600">Keine Treffer für „${esc(q)}"</p>
    </div>`;
    return;
  }

  let html='';

  if(itemHits.length){
    html+=`<div class="sec">📦 Gegenstände (${itemHits.length})</div>`;
    itemHits.forEach(({item,box})=>{
      const col=getColor(box.color);
      const nameHL=highlight(item.name,term);
      const noteHL=item.notes?highlight(item.notes,term):'';
      html+=`<button class="box-card" onclick="navigate('detail',{boxId:'${box.id}'})" style="align-items:flex-start">
        <div class="color-slab" style="background:${col.hex};margin-top:2px">${col.emoji}</div>
        <div class="box-info">
          <div class="item-name" style="font-size:15px">${nameHL}</div>
          ${noteHL?`<div class="item-note" style="margin-top:2px">${noteHL}</div>`:''}
          <div style="margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:11px;font-weight:700;background:var(--bg);padding:3px 8px;border-radius:6px;color:var(--ink2)">${esc(box.name)}</span>
            <span style="font-size:11px;color:var(--muted);font-weight:500">${esc(box.sourceRoom||'—')} → ${esc(box.destination||'—')}</span>
          </div>
        </div>
        <span class="item-qty" style="margin-top:2px">${item.quantity}×</span>
      </button>`;
    });
  }

  if(boxHits.length){
    html+=`<div class="sec">🗂️ Kartons (${boxHits.length})</div>`;
    boxHits.forEach(box=>{
      const col=getColor(box.color);
      const ic=box.items?.length||0;
      html+=`<button class="box-card" onclick="navigate('detail',{boxId:'${box.id}'})">
        <div class="color-slab" style="background:${col.hex}">${col.emoji}</div>
        <div class="box-info">
          <div class="box-name">${highlight(box.name,term)}</div>
          <div class="box-meta">${highlight(box.sourceRoom||'—',term)} → ${highlight(box.destination||'—',term)} · ${ic} Gegenstand${ic!==1?'stände':''}</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>`;
    });
  }

  el.innerHTML=html;
}

function highlight(text,term){
  const safe=esc(text);
  const re=new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return safe.replace(re,'<mark style="background:#fef08a;border-radius:3px;padding:0 1px">$1</mark>');
}

function startScanner(){
  if(scanner){try{scanner.stop().catch(()=>{});}catch(e){}}
  scanner=new Html5Qrcode('reader');
  const msg=document.getElementById('scan-msg');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:240}},
    text=>{scanner.stop();scanner=null;handleScan(text);},
    ()=>{}
  ).then(()=>{if(msg)msg.textContent='📷 Scanne QR-Code…';})
   .catch(err=>{if(msg)msg.innerHTML=`<span style="color:var(--danger)">Kamerazugriff verweigert: ${err}</span>`;});
}
function killScanner(){if(scanner){try{scanner.stop().catch(()=>{});}catch(e){}scanner=null;}}
function handleScan(text){
  if(text.startsWith('UMZUGSBOX:')){
    const id=text.slice(10);
    const box=getBox(id);
    if(box){toast('✅ Karton gefunden!');navigate('detail',{boxId:id});}
    else{const m=document.getElementById('scan-msg');if(m)m.innerHTML=`<span style="color:var(--danger)">❌ Karton nicht gefunden</span>`;setTimeout(()=>{if(view==='scan')startScanner();},2500);}
  }else{
    const m=document.getElementById('scan-msg');if(m)m.innerHTML=`<span style="color:var(--danger)">❌ Kein UmzugsBox QR-Code</span>`;
    setTimeout(()=>{if(view==='scan')startScanner();},2000);
  }
}
function doSearch(q){
  const el=document.getElementById('search-results');if(!el)return;
  if(!q.trim()){el.innerHTML='';return;}
  const res=boxes.filter(b=>b.name.toLowerCase().includes(q.toLowerCase())||b.id.includes(q));
  if(!res.length){el.innerHTML=`<p style="color:var(--muted);font-size:14px">Keine Treffer</p>`;return;}
  el.innerHTML=res.map(b=>{const c=getColor(b.color);
    return`<button class="box-card" style="margin-bottom:8px" onclick="navigate('detail',{boxId:'${b.id}'})">
      <div class="color-slab" style="background:${c.hex}">${c.emoji}</div>

function exportJSON(){
  const data=JSON.stringify({version:2,exported:new Date().toISOString(),exportedBy:currentUser,boxes},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`umzugsbox-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('✅ Export abgeschlossen');
}
function importJSON(input){
  const file=input.files[0];if(!file)return;
  const fr=new FileReader();
  fr.onload=async e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.boxes))throw new Error('Ungültiges Format');
      let added=0;
      d.boxes.forEach(b=>{if(!boxes.find(x=>x.id===b.id)){boxes.push(b);added++;}});
      await saveBoxes();toast(`✅ ${added} neue Karton${added!==1?'s':''} importiert`);
      if(view==='settings')render();else navigate('list');
    }catch(err){toast('❌ Importfehler: '+err.message);}
  };fr.readAsText(file);
}
async function saveGCID(){await saveSettings();toast('✅ URL gespeichert');}
async function saveScriptUrl(){await saveSettings();toast('✅ URL gespeichert');render();}

async function driveSync(){
  if(!scriptUrl.trim()){toast('❌ Bitte Script-URL eingeben');return;}
  toast('⏳ Synchronisiere…',8000);
  try{
    // POST: send all local boxes, receive merged result
    const resp=await fetch(scriptUrl,{
      method:'POST',
      body:JSON.stringify({boxes,user:currentUser})
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    if(!data.ok)throw new Error(data.error||'Unbekannter Fehler');

    // Merge: server is source of truth, but keep local boxes that are newer
    const merged=data.boxes.map(serverBox=>{
      const local=boxes.find(b=>b.id===serverBox.id);
      if(!local)return serverBox;
      const localDate=new Date(local.updatedAt||0);
      const serverDate=new Date(serverBox.updatedAt||0);
      return localDate>serverDate?local:serverBox;
    });
    // Add any local boxes not yet on server
    boxes.forEach(lb=>{if(!merged.find(b=>b.id===lb.id))merged.push(lb);});

    boxes=merged;
    lastSync=new Date().toISOString();
    await saveBoxes();
    await saveSettings();
    toast(`✅ Sync erfolgreich – ${boxes.length} Kartons`);
    render();
  }catch(e){
    toast('❌ Sync fehlgeschlagen: '+e.message);
  }
}

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Farbcode-Legende</title>
    <style>body{font-family:sans-serif;padding:30px;max-width:400px}h1{font-size:20px;margin-bottom:20px}
    .item{display:flex;align-items:center;gap:12px;padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:8px}
    .dot{width:24px;height:24px;border-radius:6px;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
    .name{font-size:16px;font-weight:700}</style></head><body>
    <h1>📦 UmzugsBox – Farbcode-Legende</h1>
    <p style="margin-bottom:16px;color:#666">Bitte Karton in den Bereich der entsprechenden Farbe stellen:</p>
    ${COLORS.map(c=>`<div class="item"><div class="dot" style="background:${c.hex}"></div><div class="name">${c.name}</div></div>`).join('')}
    </body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}
